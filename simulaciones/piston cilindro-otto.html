<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simulador Cinemático | Cilindro-Pistón (Biela Conectada Permanentemente)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1022 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', 'Roboto Mono', monospace;
            padding: 20px;
        }

        .industrial-console {
            max-width: 1400px;
            width: 100%;
            background: rgba(6, 10, 18, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(56, 189, 248, 0.35);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6);
            padding: 20px;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
        }

        .cad-viewport {
            flex: 2.5;
            background: #070b12;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #2d3a5e;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 8px 18px black;
        }

        svg {
            display: block;
            width: 100%;
            height: auto;
            background: #080c14;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .hmi-panel {
            flex: 1.2;
            background: #0d1220dd;
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 1.6rem;
            border: 1px solid #2d3448;
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
        }

        .param-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .param-group label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
        }

        .param-group label span {
            color: #38bdf8;
            background: #0f172a;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #2d3a5e;
            border-radius: 10px;
            -webkit-appearance: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #38bdf8;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px #38bdf8;
            border: none;
        }

        .btn-primary {
            background: #0f172a;
            border: 1.5px solid #38bdf8;
            color: #38bdf8;
            font-weight: bold;
            padding: 12px 0;
            border-radius: 60px;
            font-size: 0.9rem;
            font-family: monospace;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #38bdf8;
            color: #0f172a;
            box-shadow: 0 0 12px #38bdf8;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            border-top: 1px dashed #334155;
            padding-top: 1rem;
            margin-top: 0.5rem;
        }

        .legend-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            margin-right: 6px;
        }
        .legend-text {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        @media (max-width: 900px) {
            .dashboard { flex-direction: column; }
            .cad-viewport { min-width: auto; }
        }
    </style>
</head>
<body>
<div class="industrial-console">
    <div class="dashboard">
        <div class="cad-viewport">
            <svg id="engineSVG" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
                        <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e2a3a" stroke-width="0.5" stroke-opacity="0.5"/>
                    </pattern>
                    <linearGradient id="gasGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#facc15" stop-opacity="0.95"/>
                        <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#dc2626" stop-opacity="0.6"/>
                    </linearGradient>
                    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                        <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.5"/>
                    </filter>
                </defs>
                <rect width="880" height="520" fill="url(#grid)" />
                
                <!-- Base estructural -->
                <rect x="40" y="460" width="800" height="18" fill="#2c3e50" stroke="#141e2a" stroke-width="2" rx="4" />
                <text x="440" y="490" fill="#5b6e8c" font-size="10" text-anchor="middle" font-family="monospace">BLOQUE MOTOR | FUNDICIÓN DE HIERRO</text>

                <!-- CILINDRO -->
                <rect id="cylinderWall" x="155" y="110" width="150" height="300" fill="none" stroke="#6b7280" stroke-width="5" rx="8" />
                <rect id="cylinderInner" x="163" y="116" width="134" height="288" fill="#1a2438" opacity="0.6" rx="4" />
                <text x="230" y="95" fill="#9ca3af" font-size="11" text-anchor="middle" font-weight="bold">CILINDRO</text>
                
                <!-- PISTÓN -->
                <rect id="pistonHead" x="155" y="280" width="150" height="42" fill="#eab308" stroke="#ca8a04" stroke-width="2.5" rx="5" filter="url(#shadow)"/>
                <rect id="pistonRings1" x="163" y="286" width="134" height="5" fill="#a16207" opacity="0.9" rx="2" />
                <rect id="pistonRings2" x="163" y="296" width="134" height="5" fill="#a16207" opacity="0.9" rx="2" />
                <circle id="wristPin" cx="230" cy="322" r="9" fill="#facc15" stroke="#0f172a" stroke-width="2.5" />
                
                <!-- CIGÜEÑAL -->
                <circle id="crankshaft" cx="230" cy="420" r="40" fill="#475569" stroke="#94a3b8" stroke-width="3.5" filter="url(#shadow)"/>
                <!-- MUÑÓN (CRANK PIN) - se moverá dinámicamente -->
                <circle id="crankPin" cx="230" cy="380" r="11" fill="#facc15" stroke="#0f172a" stroke-width="2.5" />
                <circle id="mainBearing" cx="230" cy="420" r="10" fill="#facc15" stroke="#0f172a" stroke-width="2" />
                <text x="230" y="475" fill="#6b7280" font-size="10" text-anchor="middle">CIGÜEÑAL</text>
                
                <!-- BIELA - SE CONECTARÁ DIRECTAMENTE AL MUÑÓN -->
                <line id="connectingRod" x1="230" y1="322" x2="230" y2="380" stroke="#38bdf8" stroke-width="14" stroke-linecap="round" filter="url(#shadow)"/>
                <line id="connectingRodCore" x1="230" y1="322" x2="230" y2="380" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round"/>
                
                <!-- GASES -->
                <rect id="gasVolume" x="173" y="125" width="114" height="145" fill="url(#gasGrad)" opacity="0.85" rx="6" filter="url(#shadow)"/>
                <text x="230" y="205" fill="#fef3c7" font-size="11" text-anchor="middle" font-weight="bold" opacity="0.9">GASES</text>
                
                <!-- Telemetría -->
                <rect x="590" y="24" width="260" height="200" rx="10" fill="#0a0f1cee" stroke="#38bdf8" stroke-width="1.5" />
                <text x="720" y="50" fill="#38bdf8" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="1.5">📊 TELEMETRÍA DINÁMICA</text>
                <line x1="605" y1="58" x2="835" y2="58" stroke="#38bdf8" stroke-width="0.5" opacity="0.5"/>
                
                <text x="608" y="85" fill="#9ca3af" font-size="12">Posición pistón (mm):</text>
                <text id="pistonPos" x="608" y="108" fill="#38bdf8" font-size="18" font-weight="bold">0.0 mm</text>
                
                <text x="608" y="135" fill="#9ca3af" font-size="12">Presión (MPa):</text>
                <text id="pressureVal" x="608" y="158" fill="#facc15" font-size="18" font-weight="bold">0.00 MPa</text>
                
                <text x="608" y="185" fill="#9ca3af" font-size="12">Volumen cámara (cm³):</text>
                <text id="volumeVal" x="608" y="208" fill="#facc15" font-size="17" font-weight="bold">0.0 cm³</text>
            </svg>
        </div>

        <div class="hmi-panel">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 4px;">
                <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 6px #10b981;"></div>
                <span style="color:#e2e8f0; font-weight: 600; letter-spacing: 1px;">CONTROL · CILINDRO PISTÓN</span>
            </div>
            
            <div class="param-group">
                <label>📏 CARRERA PISTÓN (mm) <span id="strokeReadout">80.0</span></label>
                <input type="range" id="strokeSlider" min="40" max="140" step="1" value="80">
            </div>

            <div class="param-group">
                <label>🔧 DIÁMETRO CILINDRO (mm) <span id="boreReadout">70.0</span></label>
                <input type="range" id="boreSlider" min="40" max="120" step="1" value="70">
            </div>

            <div class="param-group">
                <label>⚡ VELOCIDAD (RPM) <span id="rpmReadout">50</span></label>
                <input type="range" id="rpmSlider" min="20" max="150" step="5" value="50">
            </div>

            <div class="param-group">
                <label>🔩 HOLGURA CULATA (mm) <span id="clearanceReadout">5.0</span></label>
                <input type="range" id="clearanceSlider" min="2" max="15" step="0.5" value="5">
            </div>

            <button id="pausePlayBtn" class="btn-primary">⏸️ PAUSAR ANIMACIÓN</button>

            <div class="legend">
                <div><span class="legend-color" style="background: #eab308;"></span><span class="legend-text">Pistón (aleación)</span></div>
                <div><span class="legend-color" style="background: #38bdf8;"></span><span class="legend-text">Biela / Cigüeñal</span></div>
                <div><span class="legend-color" style="background: #facc15;"></span><span class="legend-text">Gases combustión</span></div>
                <div><span class="legend-color" style="background: #6b7280;"></span><span class="legend-text">Cilindro / bloque</span></div>
            </div>
            <div style="font-size:9px; text-align:center; color:#4a5b7a;">✅ BIELA CONECTADA DIRECTAMENTE AL MUÑÓN DEL CIGÜEÑAL</div>
        </div>
    </div>
</div>

<script>
    (function(){
        // Elementos DOM
        const pistonRect = document.getElementById('pistonHead');
        const pistonRings1 = document.getElementById('pistonRings1');
        const pistonRings2 = document.getElementById('pistonRings2');
        const wristPin = document.getElementById('wristPin');
        const conRod = document.getElementById('connectingRod');
        const conRodCore = document.getElementById('connectingRodCore');
        const crankPin = document.getElementById('crankPin');
        const gasVolume = document.getElementById('gasVolume');
        const crankshaft = document.getElementById('crankshaft');
        
        // Telemetría
        const pistonPosElem = document.getElementById('pistonPos');
        const pressureElem = document.getElementById('pressureVal');
        const volumeElem = document.getElementById('volumeVal');
        
        // Controles
        const strokeSlider = document.getElementById('strokeSlider');
        const strokeReadout = document.getElementById('strokeReadout');
        const boreSlider = document.getElementById('boreSlider');
        const boreReadout = document.getElementById('boreReadout');
        const rpmSlider = document.getElementById('rpmSlider');
        const rpmReadout = document.getElementById('rpmReadout');
        const clearanceSlider = document.getElementById('clearanceSlider');
        const clearanceReadout = document.getElementById('clearanceReadout');
        const toggleBtn = document.getElementById('pausePlayBtn');
        
        // Parámetros del mecanismo
        let stroke = 80;
        let bore = 70;
        let rpm = 50;
        let clearanceHeight = 5;
        
        // Derivados
        let crankRadius = stroke / 2;
        let angularVelocity = (rpm * 2 * Math.PI) / 60;
        
        let currentAngle = 0.0;
        let isAnimating = true;
        let animationId = null;
        let lastTimestamp = 0;
        
        // Posiciones fijas
        const crankCenter = { x: 230, y: 420 };
        const cylinderTop = 110;
        
        let pistonMinY, pistonMaxY;
        
        // ========== ACTUALIZAR GEOMETRÍA ==========
        function updateGeometry() {
            stroke = parseFloat(strokeSlider.value);
            strokeReadout.innerText = stroke.toFixed(1);
            bore = parseFloat(boreSlider.value);
            boreReadout.innerText = bore.toFixed(1);
            rpm = parseFloat(rpmSlider.value);
            rpmReadout.innerText = Math.round(rpm);
            clearanceHeight = parseFloat(clearanceSlider.value);
            clearanceReadout.innerText = clearanceHeight.toFixed(1);
            
            // Restricciones
            stroke = Math.min(140, Math.max(40, stroke));
            bore = Math.min(120, Math.max(40, bore));
            clearanceHeight = Math.min(15, Math.max(2, clearanceHeight));
            
            strokeSlider.value = stroke;
            boreSlider.value = bore;
            clearanceSlider.value = clearanceHeight;
            
            // Recalcular
            crankRadius = stroke / 2;
            angularVelocity = (rpm * 2 * Math.PI) / 60;
            pistonMinY = cylinderTop + clearanceHeight;
            pistonMaxY = pistonMinY + stroke;
            
            // Ajustar tamaño visual del cigüeñal
            let visualRadius = Math.min(55, Math.max(30, crankRadius * 0.9));
            crankshaft.setAttribute('r', visualRadius);
        }
        
        // Posición del muñón del cigüeñal
        function getCrankPinPos(angleRad) {
            return {
                x: crankCenter.x + crankRadius * Math.cos(angleRad),
                y: crankCenter.y - crankRadius * Math.sin(angleRad)
            };
        }
        
        // Posición del pistón (movimiento armónico simple pero preciso)
        function getPistonY(angleRad) {
            // Fórmula simplificada pero precisa para biela infinita (movimiento senoidal puro)
            // Esto asegura que el pistón recorre exactamente la carrera seleccionada
            let displacement = crankRadius * (1 - Math.cos(angleRad));
            let pistonY = pistonMinY + displacement;
            return Math.min(pistonMaxY, Math.max(pistonMinY, pistonY));
        }
        
        // Volumen (cm³)
        function computeVolume(pistonY) {
            let areaCm2 = (Math.PI * Math.pow(bore/10, 2)) / 4;
            let displacementVol = areaCm2 * ((pistonY - pistonMinY) / 10);
            let clearanceVol = areaCm2 * (clearanceHeight / 10);
            return clearanceVol + displacementVol;
        }
        
        // Presión (MPa)
        function computePressure(pistonY, angleRad) {
            let volume = computeVolume(pistonY);
            let maxVol = computeVolume(pistonMaxY);
            let minVol = computeVolume(pistonMinY);
            let compressionRatio = maxVol / minVol;
            let pressureBase = 0.1;
            
            if (volume < minVol * 1.08) {
                let explosion = 4.5 + 3.0 * Math.abs(Math.sin(angleRad * 4));
                return Math.min(9.0, pressureBase * compressionRatio * explosion);
            } else {
                let p = pressureBase * Math.pow(maxVol / volume, 1.35);
                return Math.min(7.5, p);
            }
        }
        
        // ========== ACTUALIZACIÓN GRÁFICA ==========
        function updateGraphics(angleRad) {
            // 1. Posición del pistón
            const pistonY = getPistonY(angleRad);
            const pistonTop = pistonY;
            
            pistonRect.setAttribute('y', pistonTop);
            pistonRings1.setAttribute('y', pistonTop + 6);
            pistonRings2.setAttribute('y', pistonTop + 16);
            
            // 2. Bulón del pistón (conexión superior)
            const wristX = crankCenter.x;
            const wristY = pistonTop + 22;
            wristPin.setAttribute('cx', wristX);
            wristPin.setAttribute('cy', wristY);
            
            // 3. Muñón del cigüeñal (conexión inferior) - ¡LA CLAVE!
            const crankPinPos = getCrankPinPos(angleRad);
            crankPin.setAttribute('cx', crankPinPos.x);
            crankPin.setAttribute('cy', crankPinPos.y);
            
            // 4. BIELA: Conecta EXACTAMENTE el bulón con el muñón del cigüeñal
            // Esto garantiza que NUNCA se desconecten
            conRod.setAttribute('x1', wristX);
            conRod.setAttribute('y1', wristY);
            conRod.setAttribute('x2', crankPinPos.x);
            conRod.setAttribute('y2', crankPinPos.y);
            
            conRodCore.setAttribute('x1', wristX);
            conRodCore.setAttribute('y1', wristY);
            conRodCore.setAttribute('x2', crankPinPos.x);
            conRodCore.setAttribute('y2', crankPinPos.y);
            
            // 5. Gases
            let gasHeight = Math.max(3, pistonTop - cylinderTop);
            gasVolume.setAttribute('y', cylinderTop);
            gasVolume.setAttribute('height', gasHeight);
            
            // 6. Intensidad visual
            let pressure = computePressure(pistonTop, angleRad);
            let intensity = Math.min(0.92, 0.35 + pressure / 9);
            gasVolume.setAttribute('opacity', intensity);
            
            // 7. TELEMETRÍA
            let pistonPosMM = (pistonTop - pistonMinY).toFixed(1);
            pistonPosElem.textContent = `${pistonPosMM} mm`;
            pressureElem.textContent = `${pressure.toFixed(2)} MPa`;
            volumeElem.textContent = `${computeVolume(pistonTop).toFixed(1)} cm³`;
        }
        
        // ========== REDIMENSIONAR CILINDRO ==========
        function resizeCylinder() {
            const cylinderWidth = Math.min(170, Math.max(80, bore * 1.2));
            const offsetX = crankCenter.x - cylinderWidth/2;
            
            document.getElementById('cylinderWall').setAttribute('width', cylinderWidth);
            document.getElementById('cylinderWall').setAttribute('x', offsetX);
            document.getElementById('cylinderInner').setAttribute('width', cylinderWidth - 12);
            document.getElementById('cylinderInner').setAttribute('x', offsetX + 6);
            
            pistonRect.setAttribute('width', cylinderWidth);
            pistonRect.setAttribute('x', offsetX);
            pistonRings1.setAttribute('width', cylinderWidth - 12);
            pistonRings1.setAttribute('x', offsetX + 6);
            pistonRings2.setAttribute('width', cylinderWidth - 12);
            pistonRings2.setAttribute('x', offsetX + 6);
            gasVolume.setAttribute('width', cylinderWidth - 24);
            gasVolume.setAttribute('x', offsetX + 12);
        }
        
        // ========== SINCRONIZAR ==========
        function syncAll() {
            updateGeometry();
            resizeCylinder();
            updateGraphics(currentAngle);
        }
        
        // Eventos
        strokeSlider.addEventListener('input', syncAll);
        boreSlider.addEventListener('input', syncAll);
        rpmSlider.addEventListener('input', syncAll);
        clearanceSlider.addEventListener('input', syncAll);
        
        // ========== BOTÓN PAUSA ==========
        function toggleSimulation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                toggleBtn.innerHTML = "⏸️ PAUSAR ANIMACIÓN";
                toggleBtn.style.background = "#0f172a";
                toggleBtn.style.color = "#38bdf8";
                lastTimestamp = 0;
            } else {
                toggleBtn.innerHTML = "▶️ INICIAR ANIMACIÓN";
                toggleBtn.style.background = "#38bdf8";
                toggleBtn.style.color = "#0f172a";
            }
        }
        toggleBtn.addEventListener('click', toggleSimulation);
        
        // ========== ANIMACIÓN ==========
        function animate(time) {
            if (!isAnimating) {
                animationId = requestAnimationFrame(animate);
                return;
            }
            if (lastTimestamp === 0) {
                lastTimestamp = time;
                animationId = requestAnimationFrame(animate);
                return;
            }
            let delta = Math.min(0.033, (time - lastTimestamp) / 1000);
            if (delta > 0.001) {
                currentAngle += angularVelocity * delta;
                currentAngle = currentAngle % (2 * Math.PI);
                updateGraphics(currentAngle);
            }
            lastTimestamp = time;
            animationId = requestAnimationFrame(animate);
        }
        
        // ========== INICIALIZACIÓN ==========
        function init() {
            syncAll();
            currentAngle = 0.0;
            updateGraphics(currentAngle);
            isAnimating = true;
            lastTimestamp = 0;
            animationId = requestAnimationFrame(animate);
        }
        init();
    })();
</script>
</body>
</html>
